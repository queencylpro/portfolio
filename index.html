<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queency Lim Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
      color: #222;
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: white;
      display: grid;
      grid-template-columns: 300px 1fr;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      border-radius: 12px;
    }

    .sidebar {
      background: #f1ece4;
      padding: 30px;
    }

    .profile-pic {
      width: 180px;
      height: 180px;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 20px;
    }

    .section {
      margin-top: 30px;
    }

    .section h2 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #444;
      border-bottom: 2px solid #bbb;
      padding-bottom: 5px;
    }

    .section ul {
      padding-left: 18px;
    }

    .section li {
      margin-bottom: 8px;
      font-size: 14px;
    }

    .main {
      padding: 40px;
    }

    .hero {
      background: #5c6557;
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
    }
</html>
